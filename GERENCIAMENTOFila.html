<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admissão de Pacientes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="teladois.css" />
</head>
<body>
  <div class="container">
    <h1 id="tituloPagina">Admissão de Pacientes</h1>

    <form id="formPaciente">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <span id="erroNome" class="erro hidden">Insira o nome completo</span>

      <input type="text" id="cpf" placeholder="CPF" maxlength="14" />
      <span id="erroCpf" class="erro hidden">CPF inválido, revise o CPF informado</span>

      <div class="checkbox-container">
        <label><input type="checkbox" id="semCpf" /> Paciente não possui CPF</label>
      </div>

      <input type="number" id="idade" placeholder="Idade" required min="0" max="130" />

      <select id="sexo" required>
        <option value="">Sexo</option>
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
        <option value="Outro">Outro</option>
      </select>

      <select id="prioridade">
        <option value="">PRIORIDADES</option>
        <option value="Comum">Comum</option>
        <option value="Prioridade">Prioridade</option>
        <option value="80+">80+</option>
      </select>

      <select id="servico">
        <option value="">SERVIÇOS</option>
        <option value="Exames">Exames</option>
        <option value="Consulta">Consulta</option>
        <option value="Exames agendados">Exames agendados</option>
        <option value="Entrega de material">Entrega de material</option>
        <option value="Agendar/Informacões">Agendar/Informações</option>
      </select>

      <button type="submit" disabled>Gerar senha</button>
    </form>

    <h2 id="tituloFila">Fila de Pacientes</h2>
    <ul id="fila"></ul>

    <div id="atendimento" class="hidden">
      <h2>Próximo paciente</h2>
      <p><strong>Nome:</strong> <span id="nomePaciente"></span></p>
      <p><strong>CPF:</strong> <span id="cpfPaciente"></span></p>
      <p><strong>Prioridade:</strong> <span id="prioridadePaciente"></span></p>
      <p><strong>Serviços:</strong> <span id="servicoPaciente"></span></p>

      <label>Todos os exames foram realizados?
        <select id="exames">
          <option value="">Selecione</option>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
      </label>

      <label>Motivo da não realização:
        <select id="motivo">
          <option value="">Selecione</option>
          <option>Paciente desistiu</option>
          <option>Paciente não compareceu ao guichê</option>
          <option>Paciente não trouxe documentação</option>
          <option>Paciente fora do preparo do exame</option>
          <option>Erro de agendamento</option>
          <option>Outro</option>
        </select>
      </label>

      <button onclick="finalizarAtendimento()">Finalizar Atendimento</button>
      <button onclick="cancelarAtendimento()">Cancelar paciente</button>
    </div>
    <button id="mostrarHistoricoBtn">
  <i class="fas fa-history"></i> Histórico de Atendimentos
</button>
    <div id="historico" class="hidden">
      <h2>Histórico de Atendimentos</h2>
      <ul id="listaHistorico"></ul>
    </div>
  </div>
  <script src="telatres.js"></script>
</body>
</html>
